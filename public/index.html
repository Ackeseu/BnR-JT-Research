<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to B&R JT Research Co. Limited</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="research.html">Research Papers</a>
            <a href="events.html">Events</a>
            <a href="login.html">Member Login</a>
        </nav>
    </header>
    <main>
        <section class="mission">
            <h2>Our Mission</h2>
            <p>[Describe your institute's mission here.]</p>
        </section>
        <section class="news">
            <h2>Latest News</h2>
            <div id="news-feed"></div>
        </section>
    </main>
    <script>
        fetch('https://researchinstitutecms.blob.core.windows.net/news/news1.json')
          .then(response => response.json())
          .then(data => {
            document.getElementById('news-feed').innerHTML = `
              <h3>${data.title}</h3>
              <p>${data.date} - ${data.content}</p>
            `;
          });
    </script>
</body>
