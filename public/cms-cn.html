<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理系统 - 一带一路建投研究院</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .cms-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .cms-nav { display: flex; border-bottom: 2px solid #eee; margin-bottom: 2rem; }
        .cms-nav button { background: none; border: none; padding: 1rem 2rem; cursor: pointer; font-size: 1rem; }
        .cms-nav button.active { border-bottom: 3px solid var(--primary-color); color: var(--primary-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; }
        .form-group textarea { min-height: 150px; }
        .items-list { margin-top: 2rem; }
        .item-card { background: #f9f9f9; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .item-actions { margin-top: 1rem; }
        .item-actions button { margin-right: 0.5rem; padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        .btn-delete { background-color: var(--accent-color); color: white; }
        .btn-edit { background-color: var(--secondary-color); color: white; }
        .message { padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .message.success { background-color: #d4edda; color: #155724; }
        .message.error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-content">
                <div class="logo">🔬 一带一路建投研究院</div>
                <div class="nav-links">
                    <a href="index-cn.html">首页</a>
                    <a href="research-cn.html">研究论文</a>
                    <a href="resources-cn.html">资源中心</a>
                    <a href="events-cn.html">活动</a>
                    <a href="login-cn.html" id="login-link">会员登录</a>
                    <a href="cms-cn.html" class="active" id="cms-link">管理平台</a>
                    <a href="cms.html" class="lang-switch">🌐 English</a>
                    <a href="cms-zh.html" class="lang-switch">🌐 繁體</a>
                </div>
            </div>
        </nav>
        <div class="banner">
            <img src="images/banner.jpg" alt="一带一路建投研究院" loading="eager">
            <div class="banner-overlay">
                <div class="banner-text">
                    <p class="eyebrow">内容管理</p>
                    <h1>管理您的研究内容</h1>
                    <p class="subtitle">添加、编辑和管理新闻、活动、论文和用户。</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="cms-container">
            <div id="message-container"></div>

            <div class="cms-nav">
                <button class="active" onclick="showTab('news', this)">新闻</button>
                <button onclick="showTab('events', this)">活动</button>
                <button onclick="showTab('papers', this)">论文</button>
                <button onclick="showTab('users', this)">用户</button>
            </div>

            <!-- News Tab -->
            <div id="news-tab" class="tab-content active">
                <h2>管理新闻</h2>
                <form onsubmit="addNews(event)">
                    <div class="form-group">
                        <label for="news-title">标题</label>
                        <input type="text" id="news-title" required>
                    </div>
                    <div class="form-group">
                        <label for="news-content">内容</label>
                        <textarea id="news-content" rows="5" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="news-image">图片网址（可选）</label>
                        <input type="url" id="news-image" placeholder="https://example.com/image.jpg">
                        <small>或上传图片文件：</small>
                        <input type="file" id="news-image-upload" accept="image/*" onchange="previewImage(this)">
                        <div id="image-preview" style="display:none; margin-top: 1rem;">
                            <img id="preview-img" style="max-width: 300px; border-radius: 8px;" alt="预览">
                        </div>
                    </div>
                    <button type="submit" class="btn">📤 发布新闻</button>
                </form>
                <div id="news-list" class="items-list"></div>
            </div>

            <!-- Events Tab -->
            <div id="events-tab" class="tab-content">
                <h2>管理活动</h2>
                <form onsubmit="addEvent(event)">
                    <div class="form-group">
                        <label for="event-title">活动标题</label>
                        <input type="text" id="event-title" required>
                    </div>
                    <div class="form-group">
                        <label for="event-date">日期</label>
                        <input type="date" id="event-date" required>
                    </div>
                    <div class="form-group">
                        <label for="event-time">时间</label>
                        <input type="time" id="event-time">
                    </div>
                    <div class="form-group">
                        <label for="event-location">地点</label>
                        <input type="text" id="event-location" required>
                    </div>
                    <div class="form-group">
                        <label for="event-description">描述</label>
                        <textarea id="event-description" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="event-email">联系电子邮箱（可选）</label>
                        <input type="email" id="event-email">
                    </div>
                    <div class="form-group">
                        <label for="event-image">活动图片网址（可选）</label>
                        <input type="url" id="event-image" placeholder="https://example.com/event.jpg">
                        <small>或上传图片文件：</small>
                        <input type="file" id="event-image-upload" accept="image/*" onchange="previewEventImage(this)">
                        <div id="event-image-preview" style="display:none; margin-top: 1rem;">
                            <img id="event-preview-img" style="max-width: 300px; border-radius: 8px;" alt="活动预览">
                        </div>
                    </div>
                    <button type="submit" class="btn">📅 创建活动</button>
                </form>
                <div id="events-list" class="items-list"></div>
            </div>

            <!-- Papers Tab -->
            <div id="papers-tab" class="tab-content">
                <h2>管理研究论文</h2>
                <form onsubmit="addPaper(event)">
                    <div class="form-group">
                        <label for="paper-title">论文标题</label>
                        <input type="text" id="paper-title" required>
                    </div>
                    <div class="form-group">
                        <label for="paper-authors">作者</label>
                        <input type="text" id="paper-authors" required>
                    </div>
                    <div class="form-group">
                        <label for="paper-journal">期刊</label>
                        <input type="text" id="paper-journal" required>
                    </div>
                    <div class="form-group">
                        <label for="paper-year">年份</label>
                        <input type="number" id="paper-year" required min="1900" max="2100">
                    </div>
                    <div class="form-group">
                        <label for="paper-doi">DOI</label>
                        <input type="text" id="paper-doi" required>
                    </div>
                    <div class="form-group">
                        <label for="paper-pdf">PDF URL</label>
                        <input type="url" id="paper-pdf">
                    </div>
                    <div class="form-group">
                        <label for="paper-member-only">仅限会员</label>
                        <select id="paper-member-only">
                            <option value="false">否</option>
                            <option value="true">是</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">添加论文</button>
                </form>
                <div id="papers-list" class="items-list"></div>
            </div>

            <!-- Users Tab -->
            <div id="users-tab" class="tab-content">
                <h2>管理用户</h2>
                <form onsubmit="addUser(event)">
                    <div class="form-group">
                        <label for="user-email">电子邮箱</label>
                        <input type="email" id="user-email" required>
                    </div>
                    <div class="form-group">
                        <label for="user-name">姓名</label>
                        <input type="text" id="user-name" required>
                    </div>
                    <div class="form-group">
                        <label for="user-role">角色</label>
                        <select id="user-role">
                            <option value="member">会员</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">添加用户</button>
                </form>
                <div id="users-list" class="items-list"></div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-grid">
            <div>
                <h4>一带一路建投研究院</h4>
                <p>联系：<a href="mailto:info@brjtresearch.org">info@brjtresearch.org</a></p>
                <p>电话：+852 2888-8888</p>
                <p>地址：香港中环</p>
            </div>
            <div>
                <h4>重要链接</h4>
                <ul>
                    <li><a href="index-cn.html">首页</a></li>
                    <li><a href="research-cn.html">研究论文</a></li>
                    <li><a href="resources-cn.html">资源中心</a></li>
                    <li><a href="events-cn.html">活动</a></li>
                </ul>
            </div>
            <div>
                <h4>会员服务</h4>
                <ul>
                    <li><a href="login-cn.html">会员登录</a></li>
                    <li><a href="cms-cn.html">管理平台</a></li>
                </ul>
            </div>
        </div>
        <p class="footer-legal">&copy; 2026 一带一路建投研究院。版权所有。</p>
    </footer>

    <script>
        // Define showTab first to ensure it's available
        function showTab(tabName, buttonElement) {
            console.log('showTab called with:', tabName);
            
            // Hide all tab contents
            const allTabs = document.querySelectorAll('.tab-content');
            allTabs.forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active from all buttons
            const allButtons = document.querySelectorAll('.cms-nav button');
            allButtons.forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            const selectedTab = document.getElementById(tabName + '-tab');
            if (selectedTab) {
                selectedTab.classList.add('active');
                console.log('Activated tab:', tabName);
            } else {
                console.error('Tab not found:', tabName + '-tab');
            }
            
            // Activate clicked button
            if (buttonElement) {
                buttonElement.classList.add('active');
            }
        }

        function checkAuth() {
            const token = localStorage.getItem('authToken');
            if (!token) {
                window.location.href = 'login-cn.html';
                return false;
            }
            return true;
        }

        checkAuth();

        function showMessage(message, type = 'success') {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 3000);
        }

        function previewImage(input) {
            const preview = document.getElementById('image-preview');
            const previewImg = document.getElementById('preview-img');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.style.display = 'none';
            }
        }

        function addNews(event) {
            event.preventDefault();
            const title = document.getElementById('news-title').value;
            const content = document.getElementById('news-content').value;
            const imageUrl = document.getElementById('news-image').value;
            const imageFile = document.getElementById('news-image-upload').files[0];
            
            if (title && content) {
                const newsData = { 
                    title, 
                    date: new Date().toISOString().split('T')[0], 
                    content,
                    image: imageUrl || null
                };
                
                // If image file was uploaded, convert to base64
                if (imageFile && !imageUrl) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        newsData.image = e.target.result;
                        localStorage.setItem('latestNews', JSON.stringify(newsData));
                        alert('✓ 新闻文章发布成功！刷新主页查看更新。');
                        clearNewsForm();
                        loadNews();
                    };
                    reader.readAsDataURL(imageFile);
                } else {
                    localStorage.setItem('latestNews', JSON.stringify(newsData));
                    alert('✓ 新闻文章发布成功！刷新主页查看更新。');
                    clearNewsForm();
                    loadNews();
                }
            } else {
                alert('请填写标题和内容字段');
            }
        }
        
        function clearNewsForm() {
            document.getElementById('news-title').value = '';
            document.getElementById('news-content').value = '';
            document.getElementById('news-image').value = '';
            document.getElementById('news-image-upload').value = '';
            document.getElementById('image-preview').style.display = 'none';
        }

        function previewEventImage(input) {
            const preview = document.getElementById('event-image-preview');
            const previewImg = document.getElementById('event-preview-img');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            } else {
                preview.style.display = 'none';
            }
        }

        function addEvent(event) {
            event.preventDefault();
            const title = document.getElementById('event-title').value;
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value;
            const location = document.getElementById('event-location').value;
            const description = document.getElementById('event-description').value;
            const email = document.getElementById('event-email').value;
            const imageUrl = document.getElementById('event-image').value;
            const imageFile = document.getElementById('event-image-upload').files[0];
            
            if (title && date && location && description) {
                const newEvent = {
                    id: Date.now(),
                    title, date, time, location, description,
                    contact_email: email,
                    image: imageUrl || null
                };
                
                // If image file was uploaded, convert to base64
                if (imageFile && !imageUrl) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        newEvent.image = e.target.result;
                        let events = JSON.parse(localStorage.getItem('customEvents') || '[]');
                        events.push(newEvent);
                        localStorage.setItem('customEvents', JSON.stringify(events));
                        alert('✓ 活动创建成功！刷新活动页面查看。');
                        clearEventForm();
                        loadEvents();
                    };
                    reader.readAsDataURL(imageFile);
                } else {
                    let events = JSON.parse(localStorage.getItem('customEvents') || '[]');
                    events.push(newEvent);
                    localStorage.setItem('customEvents', JSON.stringify(events));
                    alert('✓ 活动创建成功！刷新活动页面查看。');
                    clearEventForm();
                    loadEvents();
                }
            } else {
                alert('请填写所有必填字段（标题、日期、地点、描述）');
            }
        }
        
        function clearEventForm() {
            document.getElementById('event-title').value = '';
            document.getElementById('event-date').value = '';
            document.getElementById('event-time').value = '';
            document.getElementById('event-location').value = '';
            document.getElementById('event-description').value = '';
            document.getElementById('event-email').value = '';
            document.getElementById('event-image').value = '';
            document.getElementById('event-image-upload').value = '';
            document.getElementById('event-image-preview').style.display = 'none';
        }

        function addPaper(event) {
            event.preventDefault();
            showMessage('论文已成功添加！');
            event.target.reset();
            loadPapers();
        }

        function addUser(event) {
            event.preventDefault();
            showMessage('用户已成功添加！');
            event.target.reset();
            loadUsers();
        }

        function loadNews() {
            const newsData = JSON.parse(localStorage.getItem('latestNews') || '{}');
            const list = document.getElementById('news-list');
            
            if (newsData.title) {
                list.innerHTML = `
                    <h3>最新新闻</h3>
                    <div class="news-item" style="margin-bottom: 1.5rem; padding: 1rem; border: 1px solid #ddd; border-radius: 8px;">
                        ${newsData.image ? `<img src="${newsData.image}" style="max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 1rem;" alt="${newsData.title}">` : ''}
                        <h4>${newsData.title}</h4>
                        <p class="news-date">${newsData.date}</p>
                        <p>${newsData.content}</p>
                        <button class="btn-delete" onclick="deleteNews()">删除</button>
                    </div>
                `;
            } else {
                list.innerHTML = '<p>暂无新闻文章。</p>';
            }
        }

        function deleteNews() {
            if (confirm('确定要删除此新闻文章吗？')) {
                localStorage.removeItem('latestNews');
                alert('新闻已删除');
                loadNews();
            }
        }

        function loadEvents() {
            const customEvents = JSON.parse(localStorage.getItem('customEvents') || '[]');
            const list = document.getElementById('events-list');
            
            if (customEvents.length > 0) {
                list.innerHTML = '<h3>自定义活动</h3>' + customEvents.map(event => `
                    <div class="event-preview" style="margin-bottom: 1.5rem; padding: 1rem; border: 1px solid #ddd; border-radius: 8px;">
                        ${event.image ? `<img src="${event.image}" style="max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 1rem;" alt="${event.title}">` : ''}
                        <h4>${event.title}</h4>
                        <p><strong>日期：</strong> ${event.date} ${event.time ? '| ' + event.time : ''}</p>
                        <p><strong>地点：</strong> ${event.location}</p>
                        <p>${event.description}</p>
                        ${event.contact_email ? `<p><strong>联系：</strong> ${event.contact_email}</p>` : ''}
                        <button class="btn-delete" onclick="deleteEvent(${event.id})">删除</button>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p>暂无自定义活动。</p>';
            }
        }

        function deleteEvent(eventId) {
            if (confirm('确定要删除此活动吗？')) {
                let events = JSON.parse(localStorage.getItem('customEvents') || '[]');
                events = events.filter(e => e.id !== eventId);
                localStorage.setItem('customEvents', JSON.stringify(events));
                alert('活动已删除');
                loadEvents();
            }
        }

        function loadPapers() {
            fetch('papers.json')
                .then(response => response.json())
                .then(data => {
                    const list = document.getElementById('papers-list');
                    list.innerHTML = '<h3>现有论文</h3>';
                    data.public.concat(data.members).forEach(item => {
                        list.innerHTML += `
                            <div class="item-card">
                                <h4>${item.title}</h4>
                                <p><strong>作者：</strong> ${item.authors}</p>
                                <p><strong>期刊：</strong> ${item.journal} (${item.year})</p>
                                <div class="item-actions">
                                    <button class="btn-edit">编辑</button>
                                    <button class="btn-delete">删除</button>
                                </div>
                            </div>
                        `;
                    });
                });
        }

        function loadUsers() {
            const list = document.getElementById('users-list');
            list.innerHTML = '<h3>现有用户</h3><p>用户管理功能将在完整后端实施时可用。</p>';
        }

        loadNews();
        loadEvents();
        loadPapers();
        loadUsers();
    </script>
</body>
</html>
