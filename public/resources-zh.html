<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資源中心 - 一帶一路建投研究院</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-content">
                <div class="logo">🔬 一帶一路建投研究院</div>
                <div class="nav-links">
                    <a href="index-zh.html">首頁</a>
                    <a href="research-zh.html">研究論文</a>
                    <a href="resources-zh.html" class="active">資源中心</a>
                    <a href="events-zh.html">活動</a>
                    <a href="login-zh.html" id="login-link">會員登入</a>
                    <a href="cms-zh.html" id="cms-link" style="display:none;">管理平台</a>
                    <a href="#" id="logout-link" style="display:none;">登出</a>
                    <a href="resources.html" class="lang-switch">🌐 English</a>
                </div>
            </div>
        </nav>
        <div class="banner">
            <img src="images/banner.jpg" alt="一帶一路建投研究院—實驗室及團隊橫幅" loading="eager">
            <div class="banner-overlay">
                <div class="banner-text">
                    <p class="eyebrow">研究。創新。影響。</p>
                    <h1>推動塑造未來的發現。</h1>
                    <p class="subtitle">從實驗室到發表，我們的團隊突破科學與技術的界限。</p>
                    <div class="banner-actions">
                        <a class="btn" href="research-zh.html">探索研究</a>
                        <a class="btn btn-link" href="events-zh.html">查看活動</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section>
            <h2>資源庫</h2>
            <p>訪問我們全面的國際建築合約指南、範本和工具集合。</p>
            
            <div style="margin-bottom: 3rem;">
                <label for="filter-category" style="font-weight: bold; margin-right: 1rem;">按類別篩選：</label>
                <select id="filter-category" style="padding: 0.5rem; border: 1px solid var(--border-color); border-radius: 5px;">
                    <option value="">所有資源</option>
                    <option value="範本">範本</option>
                    <option value="指南">指南</option>
                    <option value="工具">工具</option>
                    <option value="參考">參考</option>
                    <option value="研究">研究</option>
                </select>
            </div>

            <div id="resources-full-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 一帶一路建投研究院。版權所有。</p>
        <p>聯絡：info@brjtresearch.org | 電話：+852 2888-8888 | 地址：香港銀都夜市</p>
    </footer>

    <script>
        let allResources = [];

        function loadAllResources() {
            fetch('./resources-zh.json')
                .then(response => response.json())
                .then(data => {
                    allResources = data.resources;
                    renderResources(allResources);
                })
                .catch(err => console.error('Error loading resources', err));
        }

        function renderResources(resourcesToRender) {
            const container = document.getElementById('resources-full-container');
            
            if (resourcesToRender.length === 0) {
                container.innerHTML = '<p>此類別中沒有找到資源。</p>';
                return;
            }

            const resourcesHTML = resourcesToRender.map(resource => `
                <div class="resource-detail-card">
                    <div style="display: flex; align-items: flex-start; gap: 2rem;">
                        <div style="font-size: 4rem; min-width: 100px; text-align: center;">${resource.icon}</div>
                        <div style="flex-grow: 1;">
                            <h3 style="color: var(--primary-color); margin-bottom: 0.5rem;">${resource.title}</h3>
                            <p style="color: #7f8c8d; font-size: 0.9rem; margin-bottom: 0.75rem;"><strong>類別：</strong> ${resource.category}</p>
                            <p style="margin-bottom: 1rem; line-height: 1.6;">${resource.fullDescription}</p>
                            <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                                <a href="${resource.downloadUrl}" class="btn btn-small">📥 下載 (${resource.fileSize})</a>
                                <span style="color: #7f8c8d; font-size: 0.9rem;">${resource.format}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = resourcesHTML;
        }

        function filterResources() {
            const category = document.getElementById('filter-category').value;
            
            if (category === '') {
                renderResources(allResources);
            } else {
                const filtered = allResources.filter(resource => resource.category === category);
                renderResources(filtered);
            }
        }

        function checkAuth() {
            const token = localStorage.getItem('authToken');
            const loginLink = document.getElementById('login-link');
            const cmsLink = document.getElementById('cms-link');
            const logoutLink = document.getElementById('logout-link');

            if (token) {
                loginLink.style.display = 'none';
                cmsLink.style.display = 'inline-block';
                logoutLink.style.display = 'inline-block';
                logoutLink.onclick = (e) => {
                    e.preventDefault();
                    localStorage.removeItem('authToken');
                    window.location.reload();
                };
            }
        }

        // Event listener for filter
        document.getElementById('filter-category').addEventListener('change', filterResources);

        // Initialize
        loadAllResources();
        checkAuth();
    </script>
</body>
</html>
